spring.application.name=demo

# ===== BASE DE DATOS =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sistema_electronicos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=${JWT_SECRET:claveUltraSecretaParaFirmarJWTToken2026SistemaElectronicos}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== LOGGING =====
logging.level.com.example.demo=DEBUG
